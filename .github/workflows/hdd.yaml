name: Check Disk Space

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  check-space:
    runs-on: ubuntu-latest  # or macos-latest, windows-latest
    
    steps:
      - name: Show disk space usage
        run: |
          echo "=== Disk Space Overview ==="
          df -h
          
      - name: Show detailed disk space (Linux/macOS)
        run: |
          echo -e "\n=== Detailed Filesystem Info ==="
          df -hT 2>/dev/null || df -h  # -T shows filesystem type (Linux)
          
      - name: Show inode usage (Linux)
        run: |
          echo -e "\n=== Inode Usage ==="
          df -i
          
      - name: Show largest directories (top 20)
        run: |
          echo -e "\n=== Largest Directories (top 20) ==="
          du -sh /* 2>/dev/null | sort -hr | head -20
          
      - name: Free space breakdown
        run: |
          echo -e "\n=== Free Space Summary ==="
          df -h --output=target,avail,used,pcent 2>/dev/null || df -h
