name: 🎯 link2telegram

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'File URL to download'
        required: true
        type: string
      chat_id:
        description: 'Telegram Chat ID or @username'
        required: true
        type: string
      caption:
        description: 'Optional caption for the file'
        required: false
        type: string
        default: 'Downloaded file👌😎'
jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq aria2 git
      - name: 📥 Downloading The File
        run: |
          mkdir -p downloads tmp_downloads
          URL_LINE = os.environ['URL_LINE']
          for URL in $URL_LINE; do
            FILENAME=$(basename "$URL")
            echo "⬇️ Downloading $URL -> $FILENAME"

            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --dir="tmp_downloads" \
              "$URL"
          
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((1990 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting with zip..."
              # zip -s creates: file.zip, file.z01, file.z02, ...
              zip -s 1990m "downloads/${BASENAME}.zip" -j "$FILE"
              echo "✅ Parts: $(ls downloads/${BASENAME}* | wc -l)"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done
          
          rm -rf tmp_downloads

        env:
          URL_LINE: ${{ github.event.inputs.url }}


